<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>头图设计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .header-container {
            width: 100%;
            max-width: 1200px;
            background: linear-gradient(135deg, #0ABAB5 0%, #08a39e 100%);
            border-radius: 16px;
            padding: 80px 60px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(10, 186, 181, 0.2);
        }
        .header-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }
        .header-container::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }
        .content {
            position: relative;
            z-index: 10;
            color: white;
        }
        h1 {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 20px;
            font-weight: 400;
            opacity: 0.95;
            margin-bottom: 50px;
        }
        .tech-stack {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }
        .tech-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.15);
            padding: 20px 30px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .tech-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
        }
        .tech-icon {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .tech-name {
            font-size: 18px;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            .header-container {
                padding: 50px 30px;
            }
            h1 {
                font-size: 32px;
            }
            .subtitle {
                font-size: 16px;
            }
            .tech-stack {
                gap: 20px;
            }
            .tech-item {
                padding: 16px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="content">
            <h1>跟着 Code Buddy 一步步搞定</h1>
            <div class="subtitle">飞书机器人 × Supabase × 智能开发流程</div>
            
            <div class="tech-stack">
                <div class="tech-item">
                    <div class="tech-icon">🤖</div>
                    <div class="tech-name">Code Buddy</div>
                </div>
                <div class="tech-item">
                    <div class="tech-icon">🐦</div>
                    <div class="tech-name">飞书机器人</div>
                </div>
                <div class="tech-item">
                    <div class="tech-icon">🗄️</div>
                    <div class="tech-name">Supabase</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
